<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <div class="popup-header">
    <div class="popup-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <div>
      <div class="popup-title">Bulk Creator Messenger</div>
      <div class="popup-sub">by ashirarif.com</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats">Loading…</div>

  <!-- Campaign controls -->
  <div class="section-label">Campaign</div>
  <div class="controls">
    <button id="start" class="primary">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      Start
    </button>
    <button id="stop" class="danger">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
      Stop
    </button>
  </div>

  <!-- Server settings -->
  <div class="section-label">Server &amp; team sync</div>
  <div class="server-box">
    <label>Server URL
      <span class="hint">All employees must use the same URL. Leave blank for local only.</span>
      <input type="text" id="serverUrl" placeholder="https://HOST/server/api.php" />
    </label>
    <label>Your name (employee)
      <span class="hint">Enter your exact panel username for tracking to match.</span>
      <input type="text" id="employee" placeholder="e.g. ashir" />
    </label>
    <label>Server token
      <span class="hint">Must match API_TOKEN in server/config.php.</span>
      <input type="text" id="serverToken" placeholder="shared secret" />
    </label>
    <div class="row" style="padding:0; margin:10px 0 0;">
      <button id="testServer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        Test connection
      </button>
    </div>
    <div class="server-status" id="serverStatus"></div>
  </div>

  <!-- Template -->
  <div class="section-label">Message template</div>
  <div class="fields-wrap">
    <span class="hint" style="margin-bottom:6px;">Tokens: {handle} {nickname} {first_name}</span>
    <textarea id="template" rows="7"></textarea>
  </div>

  <!-- Delay / cap settings -->
  <div class="section-label">Timing &amp; limits</div>
  <div class="fields-wrap">
    <div class="grid">
      <label>Min delay (s)
        <input type="number" id="minDelay" min="30" />
      </label>
      <label>Max delay (s)
        <input type="number" id="maxDelay" min="30" />
      </label>
      <label>Daily cap
        <input type="number" id="dailyCap" min="1" />
      </label>
    </div>
    <label style="margin-top:10px;">Parallel tabs
      <span class="hint">2–3 recommended. Sending is still throttled per delay.</span>
      <input type="number" id="concurrency" min="1" max="5" />
    </label>
  </div>

  <button id="save">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save settings
  </button>

  <div class="divider"></div>

  <!-- Utility buttons -->
  <div class="row">
    <button id="retryFailed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
      Retry failed
    </button>
    <button id="clearQueue" class="danger-outline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      Clear queue
    </button>
  </div>
  <div class="row">
    <button id="clearSent" class="danger-outline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
      Reset "Messaged" highlights
    </button>
  </div>

  <!-- Activity log -->
  <h2>Activity log</h2>
  <div class="log" id="log"></div>

  <div class="popup-credit">
    Built by <a href="https://ashirarif.com" target="_blank" rel="noopener">ashirarif.com</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
